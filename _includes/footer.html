<footer class="footer">
  <div class="footer__copyright">
    <div class="top">
      <span>Chi-An Wei</span>
      <img class="emoji" src="{{site.baseurl}}/img/emojis/raise-hand.svg" alt="emoji">
    </div>
    <div class="bottom">
      <span>Updated on 5 Mar 2021</span>
      <br>
      <a href="https://github.com/bchiang7">
        <span>Template credits to @bchiang7 🙇</span>
      </a>
    </div>
  </div>
  <div class="footer__links">
    {% for link in site.social %}
    <a href="{{link.url}}" target="_blank" title="{{link.title}}">
      <span class="text">{{link.title}}</span>
      <img src="{{site.baseurl}}/img/social/{{link.title}}.svg" alt="{{link.title}}">
    </a>
    {% endfor %}
  </div>
</footer>
